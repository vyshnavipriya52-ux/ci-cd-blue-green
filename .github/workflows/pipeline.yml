name: CI/CD with Docker Compose + Blue-Green + Production

on:
  push:
    branches: ["main"]

jobs:

  # 🔹 1. BUILD & TEST
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  # 🔹 2. BUILD & PUSH DOCKER IMAGE
  docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-node:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-node:latest


  # 🔹 3. STAGING (DOCKER COMPOSE: BLUE + GREEN)
  staging:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ci-cd-node

            IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-node:latest

            echo "Pull latest image"
            docker pull $IMAGE

            echo "Stop old containers"
            docker compose down || true

            echo "Start Blue & Green"
            docker compose up -d

            echo "Blue → http://<EC2-IP>:3001"
            echo "Green → http://<EC2-IP>:3002"


  # 🔹 4. PRODUCTION (MANUAL APPROVAL)
  production:
    needs: staging
    runs-on: ubuntu-latest

    environment:
      name: production   

    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-node:latest

            echo "Pull latest image"
            docker pull $IMAGE

            echo "Stop old production container"
            docker stop prod-app || true
            docker rm prod-app || true

            echo "Run new production container"
            docker run -d -p 3000:3000 --name prod-app $IMAGE

            echo "Production → http://<EC2-IP>:3000"
