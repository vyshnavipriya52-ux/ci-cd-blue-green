<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps CI/CD Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DevOps CI/CD Pipeline</h1>
    <p>Automated Build • Test • Deploy</p>
  </header>

  <section class="container">
    
    <h2>🚀 Pipeline Flow</h2>

    <div class="flowchart">
      <div class="box">Code Push<br>(GitHub)</div>
      <div class="arrow">→</div>

      <div class="box">Build & Test<br>(CI)</div>
      <div class="arrow">→</div>

      <div class="box">Docker Build<br>& Push</div>
      <div class="arrow">→</div>

      <div class="box">Deploy<br>(Blue-Green)</div>
    </div>

    <h2>🌍 Deployment Status</h2>

    <div class="status">
      <div class="env blue">BLUE ENV<br><span>Running</span></div>
      <div class="env green">GREEN ENV<br><span>Standby</span></div>
    </div>

  </section>

  <footer>
    <p>© 2026 DevOps Project | CI/CD with GitHub Actions</p>
  </footer>

</body>
</html>
